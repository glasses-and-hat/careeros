spring:
  application:
    name: careeros

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:careeros}
    username: ${DB_USERNAME:careeros}
    password: ${DB_PASSWORD:careeros}
    hikari:
      pool-name: careeros-pool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: 25
        order_inserts: true
        order_updates: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.careeros: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

careeros:
  aggregators:
    builtin-chicago:
      enabled: false
      base-url: https://www.builtinchicago.org
      search-path: /jobs/dev-engineering/senior
      max-jobs: 25
      request-delay: 250ms
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      primary-model: ${OLLAMA_PRIMARY_MODEL:llama3.1:8b}
      fast-model: ${OLLAMA_FAST_MODEL:mistral:7b}
      embedding-model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
      timeout: ${OLLAMA_REQUEST_TIMEOUT:2m}
  resume:
    master-path: ${MASTER_RESUME_PATH:}
    output-directory: ${RESUME_OUTPUT_DIRECTORY:./data/resumes}
    artifact-base-name: ${RESUME_FILE_BASENAME:Tailored_Resume}
    python-path: ${PYTHON_PATH:python3}
    process-timeout: ${RESUME_PROCESS_TIMEOUT:60s}
  matching:
    weights:
      role: 30
      technology: 30
      location: 15
      remote: 10
      company-priority: 10
      recency: 5
  info:
    name: CareerOS
    description: AI-powered job discovery and career management platform
  ingestion:
    enabled: false
    poll-interval: 30m
    connect-timeout: 5s
    read-timeout: 10s
