openapi: 3.0.3
info: {title: CareerOS API, version: 0.4.0}
servers: [{url: /}]
paths:
  /api/dashboard:
    get: {operationId: getDashboard, tags: [Discovery], responses: {'200': {description: Dashboard, content: {application/json: {schema: {$ref: '#/components/schemas/Dashboard'}}}}}}
  /api/reminders:
    get: {operationId: getReminders, tags: [Discovery], responses: {'200': {description: Reminders, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Reminder'}}}}}}}
  /api/analytics:
    get: {operationId: getAnalytics, tags: [Discovery], responses: {'200': {description: Analytics, content: {application/json: {schema: {$ref: '#/components/schemas/Analytics'}}}}}}
  /api/jobs/timeline:
    get:
      operationId: getJobTimeline
      tags: [Discovery]
      parameters: [{name: period,in: query,schema: {type: string,enum: [TODAY,YESTERDAY,LAST_7_DAYS,LAST_30_DAYS]}},{name: page,in: query,schema: {type: integer}},{name: size,in: query,schema: {type: integer}},{name: minimumScore,in: query,schema: {type: integer}},{name: remote,in: query,schema: {type: boolean}}]
      responses: {'200': {description: Jobs, content: {application/json: {schema: {$ref: '#/components/schemas/JobPage'}}}}}
  /api/v1/jobs:
    get:
      operationId: listJobs
      tags: [Jobs]
      parameters: [{name: page,in: query,schema: {type: integer}},{name: size,in: query,schema: {type: integer}},{name: title,in: query,schema: {type: string}},{name: location,in: query,schema: {type: string}},{name: remote,in: query,schema: {type: boolean}}]
      responses: {'200': {description: Jobs, content: {application/json: {schema: {$ref: '#/components/schemas/JobPostingPage'}}}}}
  /api/v1/companies:
    get: {operationId: listCompanies,tags: [Companies],parameters: [{name: page,in: query,schema: {type: integer}},{name: size,in: query,schema: {type: integer}}],responses: {'200': {description: Companies,content: {application/json: {schema: {$ref: '#/components/schemas/CompanyPage'}}}}}}
  /api/applications:
    get: {operationId: listApplications,tags: [Applications],parameters: [{name: page,in: query,schema: {type: integer}},{name: size,in: query,schema: {type: integer}}],responses: {'200': {description: Applications,content: {application/json: {schema: {$ref: '#/components/schemas/ApplicationPage'}}}}}}
    post: {operationId: createApplication,tags: [Applications],requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/ApplicationRequest'}}}},responses: {'201': {description: Created,content: {application/json: {schema: {$ref: '#/components/schemas/Application'}}}}}}
  /api/applications/{id}:
    put: {operationId: updateApplication,tags: [Applications],parameters: [{name: id,in: path,required: true,schema: {type: string,format: uuid}}],requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/ApplicationRequest'}}}},responses: {'200': {description: Updated,content: {application/json: {schema: {$ref: '#/components/schemas/Application'}}}}}}
  /api/watchlists:
    get: {operationId: listWatchlists,tags: [Watchlists],parameters: [{name: page,in: query,schema: {type: integer}},{name: size,in: query,schema: {type: integer}}],responses: {'200': {description: Watchlists,content: {application/json: {schema: {$ref: '#/components/schemas/WatchlistPage'}}}}}}
    post: {operationId: createWatchlist,tags: [Watchlists],requestBody: {required: true,content: {application/json: {schema: {type: object,required: [name],properties: {name: {type: string}}}}}},responses: {'200': {description: Created,content: {application/json: {schema: {$ref: '#/components/schemas/Watchlist'}}}}}}
  /api/saved-searches:
    get: {operationId: listSavedSearches,tags: [SavedSearches],parameters: [{name: page,in: query,schema: {type: integer}},{name: size,in: query,schema: {type: integer}}],responses: {'200': {description: Searches,content: {application/json: {schema: {$ref: '#/components/schemas/SavedSearchPage'}}}}}}
    post: {operationId: createSavedSearch,tags: [SavedSearches],requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/SavedSearchRequest'}}}},responses: {'200': {description: Created,content: {application/json: {schema: {$ref: '#/components/schemas/SavedSearch'}}}}}}
  /api/saved-searches/{id}/execute:
    post: {operationId: executeSavedSearch,tags: [SavedSearches],parameters: [{name: id,in: path,required: true,schema: {type: string,format: uuid}}],responses: {'200': {description: Results,content: {application/json: {schema: {$ref: '#/components/schemas/JobPostingPage'}}}}}}
components:
  schemas:
    Page: {type: object,properties: {page: {type: integer},size: {type: integer},totalElements: {type: integer,format: int64},totalPages: {type: integer},last: {type: boolean}}}
    JobSummary: {type: object,required: [id,title,company,remote,overallScore],properties: {id: {type: string,format: uuid},title: {type: string},company: {type: string},location: {type: string},remote: {type: boolean},postedDate: {type: string,format: date},overallScore: {type: integer},roleScore: {type: integer},technologyScore: {type: integer},locationScore: {type: integer},companyPriorityScore: {type: integer},recencyScore: {type: integer},matchExplanation: {type: array,items: {type: string}}}}
    JobPosting: {type: object,required: [id,companyId,companyName,title,remote,applyUrl],properties: {id: {type: string,format: uuid},externalId: {type: string},companyId: {type: string,format: uuid},companyName: {type: string},title: {type: string},location: {type: string},employmentType: {type: string},remote: {type: boolean},salaryMin: {type: number},salaryMax: {type: number},salaryCurrency: {type: string},description: {type: string},postedDate: {type: string,format: date},applyUrl: {type: string},createdAt: {type: string,format: date-time}}}
    JobPage: {allOf: [{$ref: '#/components/schemas/Page'},{type: object,properties: {content: {type: array,items: {$ref: '#/components/schemas/JobSummary'}}}}]}
    JobPostingPage: {allOf: [{$ref: '#/components/schemas/Page'},{type: object,properties: {content: {type: array,items: {$ref: '#/components/schemas/JobPosting'}}}}]}
    Reminder: {type: object,properties: {applicationId: {type: string,format: uuid},type: {type: string},dueDate: {type: string,format: date},message: {type: string}}}
    Dashboard: {type: object,properties: {newJobsToday: {type: integer},highMatchJobs: {type: integer},applicationsNeedingFollowUp: {type: integer},watchlistCompaniesWithNewJobs: {type: integer},topMatches: {type: array,items: {$ref: '#/components/schemas/JobSummary'}},recentJobs: {type: array,items: {$ref: '#/components/schemas/JobSummary'}},statistics: {$ref: '#/components/schemas/Analytics'}}}
    Analytics: {type: object,additionalProperties: true,properties: {applicationsThisMonth: {type: integer},responseRate: {type: number},interviewRate: {type: number},offerRate: {type: number},averageMatchScore: {type: number},applicationsByStatus: {type: object,additionalProperties: {type: integer}},jobsByAts: {type: object,additionalProperties: {type: integer}},jobsAppliedPerCompany: {type: object,additionalProperties: {type: integer}}}}
    Company: {type: object,required: [id,name,atsType,priority,enabled],properties: {id: {type: string,format: uuid},name: {type: string},careerUrl: {type: string},atsType: {type: string},priority: {type: string},enabled: {type: boolean},createdAt: {type: string,format: date-time}}}
    CompanyPage: {allOf: [{$ref: '#/components/schemas/Page'},{type: object,properties: {content: {type: array,items: {$ref: '#/components/schemas/Company'}}}}]}
    ApplicationStatus: {type: string,enum: [WISHLIST,APPLIED,RECRUITER_CONTACTED,REFERRAL_REQUESTED,RECRUITER_SCREEN,TECHNICAL_INTERVIEW,SYSTEM_DESIGN,BEHAVIORAL,FINAL_INTERVIEW,OFFER,REJECTED,WITHDRAWN]}
    Application: {type: object,properties: {id: {type: string,format: uuid},jobPostingId: {type: string,format: uuid},status: {$ref: '#/components/schemas/ApplicationStatus'},appliedDate: {type: string,format: date},followUpDate: {type: string,format: date},interviewDate: {type: string,format: date},notes: {type: string},resumeVersion: {type: string},referralName: {type: string},recruiterName: {type: string},jobLink: {type: string},lastUpdated: {type: string,format: date-time}}}
    ApplicationRequest: {type: object,required: [jobPostingId,status],properties: {jobPostingId: {type: string,format: uuid},status: {$ref: '#/components/schemas/ApplicationStatus'},appliedDate: {type: string,format: date},followUpDate: {type: string,format: date},interviewDate: {type: string,format: date},notes: {type: string},resumeVersion: {type: string},referralName: {type: string},recruiterName: {type: string},jobLink: {type: string}}}
    ApplicationPage: {allOf: [{$ref: '#/components/schemas/Page'},{type: object,properties: {content: {type: array,items: {$ref: '#/components/schemas/Application'}}}}]}
    WatchlistCompany: {type: object,properties: {id: {type: string,format: uuid},name: {type: string},priority: {type: integer},enabled: {type: boolean}}}
    Watchlist: {type: object,properties: {id: {type: string,format: uuid},name: {type: string},companies: {type: array,items: {$ref: '#/components/schemas/WatchlistCompany'}}}}
    WatchlistPage: {allOf: [{$ref: '#/components/schemas/Page'},{type: object,properties: {content: {type: array,items: {$ref: '#/components/schemas/Watchlist'}}}}]}
    SavedSearchRequest: {type: object,required: [name],properties: {name: {type: string},title: {type: string},sorting: {type: string},minimumScore: {type: integer},remote: {type: boolean},companies: {type: array,items: {type: string,format: uuid}},locations: {type: array,items: {type: string}},technologies: {type: array,items: {type: string}}}}
    SavedSearch: {allOf: [{$ref: '#/components/schemas/SavedSearchRequest'},{type: object,properties: {id: {type: string,format: uuid}}}]}
    SavedSearchPage: {allOf: [{$ref: '#/components/schemas/Page'},{type: object,properties: {content: {type: array,items: {$ref: '#/components/schemas/SavedSearch'}}}}]}
