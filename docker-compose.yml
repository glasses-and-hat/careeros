services:
  postgres:
    image: postgres:16-alpine
    container_name: careeros-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-careeros}
      POSTGRES_USER: ${DB_USERNAME:-careeros}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-careeros}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - careeros-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-careeros} -d ${DB_NAME:-careeros}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: careeros-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-careeros}
      DB_USERNAME: ${DB_USERNAME:-careeros}
      DB_PASSWORD: ${DB_PASSWORD:-careeros}
      SERVER_PORT: 8080
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_PRIMARY_MODEL: ${OLLAMA_PRIMARY_MODEL:-llama3.1:8b}
      OLLAMA_FAST_MODEL: ${OLLAMA_FAST_MODEL:-mistral:7b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      MASTER_RESUME_PATH: ${MASTER_RESUME_PATH:-/data/master-resume.docx}
      RESUME_OUTPUT_DIRECTORY: ${RESUME_OUTPUT_DIRECTORY:-/data/resumes}
      RESUME_FILE_BASENAME: ${RESUME_FILE_BASENAME:-Rahul_Yellapragada}
      LIBREOFFICE_PATH: ${LIBREOFFICE_PATH:-/usr/bin/soffice}
    volumes:
      - ./data:/data
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  careeros-postgres-data:
